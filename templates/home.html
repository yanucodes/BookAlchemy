<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>My Books</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <h1>Welcome to My Library!</h1>
    <div class="book">
        <h2 style="margin-bottom: 0;"><a href="{{ url_for('add_book') }}">Add
            new book</a></h2>
    </div>
    <div class="toolbar">
        <form method="GET" action="{{ url_for('home_page') }}">
            <label for="sort">Sort by: </label>
            <select id="sort" name="sort" onchange="this.form.submit()">
                <option value="title" {% if sort == 'title' %}selected{% endif %}>Title</option>
                <option value="author" {% if sort == 'author' %}selected{% endif %}>Author</option>
                <option value="year" {% if sort == 'year' %}selected{% endif %}>Year</option>
            </select>
            <select id="order" name="order" onchange="this.form.submit()">
                <option value="asc" {% if order == 'asc' %}selected{% endif %}> Ascending</option>
                <option value="desc" {% if order == 'desc' %}selected{% endif %}> Descending</option>
            </select>
            <input type="hidden" name="keyword" value="{{ keyword }}">
        </form>
    </div>
    <div class="toolbar">
        <form method="GET" action="{{ url_for('home_page') }}">
            <input type="text" id="keyword" name="keyword" value="{{ keyword }}">
            <input type="hidden" name="sort" value="{{ sort }}">
            <input type="hidden" name="order" value="{{ order }}">
            <input type="submit" value="search">
        </form>
    </div>
    {% if keyword %}
        <h2 style="margin-left: 10px;">Search results for keyword: <em>{{
                keyword }}</em></h2>
    {% endif %}
    {% if not books %}<h2 style="margin-left: 10px;">Nothing found.</h2>{%
            endif %}
    {% for book in books %}
    <div class="book">
        <div>
            <h3>{{ book.title }}</h3>
            <p>by {{ book.author }}</p>
            {% if book.isbn %}
                <img src="https://covers.openlibrary.org/b/isbn/{{ book.isbn }}-M.jpg?default=false"
                     onerror="this.style.display='none'"
                     alt="{{ book.title }} cover">
            {% endif %}
            <form action="{{ url_for('delete_book', book_id=book.book_id) }}"
                  method="post">
                <button type="submit" onclick="return confirm('Delete this book?')" class="button">Delete</button>
            </form>
        </div>
    </div>
    {% endfor %}
  </body>
</html>
