<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
  {% if author_added %}
  <h1>New author has successfully been added to the database.</h1>
      <a href="{{ url_for('home_page') }}">Go back</a>
      <a href="{{ url_for('add_book', author_id=new_author_id) }}">Add book by this author</a>
  {% else %}
  <form action="/add_author" method="POST">
  <label for="name">Author Name:</label> 
  <input type="text" id="name" name="name" required><br><br>
  <label for="birthdate">Birthdate:</label>
  <input type="date" id="birthdate" name="birthdate" required><br><br>
  <label for="date_of_death">Date of Death:</label> 
  <input type="date" id="date_of_death" name="date_of_death"><br><br>
  <input type="submit" value="Add Author"> 
  </form>
  {% endif %}
  </body>
</html>
